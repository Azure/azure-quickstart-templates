name: Query ADX

on:
  workflow_dispatch:
    inputs:
      correlation_id:
        description: 'ARM correlationId to look up in ADX'
        required: true
        type: string

jobs:
  query-adx:
    runs-on: ubuntu-latest
    environment: adx-readonly  # require reviewers in repo settings
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Azure login via OIDC (federated to UAMI)
        uses: azure/login@v2
        with:
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          client-id: ${{ secrets.AZURE_UAMI_CLIENT_ID }}

      - name: Query ADX via REST
        shell: bash
        env:
          CLUSTER_URL: "https://armprodeus.eastus.kusto.windows.net"
          DATABASE: ${{ secrets.ADX_DATABASE }}
          CORRELATION_ID: ${{ inputs.correlation_id }}
        run: |
          set -euo pipefail
          echo "== Azure context =="
          az account show -o jsonc

          TOKEN="$(az account get-access-token --resource "https://kusto.kusto.windows.net" --query accessToken -o tsv)"
          echo "Got token length: ${#TOKEN}"

          run_query () {
            local q="$1"
            local label="$2"
            echo "== Query test: ${label} =="
            local code
            code=$(curl -sS -o /tmp/adx_test.json -w "%{http_code}" \
              -X POST "${CLUSTER_URL}/v1/rest/query" \
              -H "Authorization: Bearer ${TOKEN}" \
              -H "Content-Type: application/json; charset=utf-8" \
              -d "$(jq -n --arg db "${DATABASE}" --arg csl "${q}" '{db:$db,csl:$csl}')")
            echo "HTTP: ${code}"
            cat /tmp/adx_test.json
            echo
          }

          run_query "Deployments | take 1" "Deployments"
          run_query "DeploymentOperations | take 1" "DeploymentOperations"