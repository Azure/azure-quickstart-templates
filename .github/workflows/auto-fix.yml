name: Validate ARM Deployments via ADX

on:
  workflow_dispatch:
    inputs:
      sampleFolder:
        description: 'Path to the sample folder containing metadata.json (e.g. quickstarts/microsoft.compute/vm-simple-windows).'
        required: true
        type: string

jobs:
  validate-deployments:
    runs-on: ubuntu-latest
    environment: adx-readonly  # require reviewers in repo settings
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure login via OIDC (federated to UAMI)
        uses: azure/login@v2
        with:
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          client-id: ${{ secrets.AZURE_UAMI_CLIENT_ID }}

      - name: Validate deployments via ADX
        shell: bash
        env:
          CLUSTER_URL: "https://armprodeus.eastus.kusto.windows.net"
          DATABASE: ${{ secrets.ADX_DATABASE }}
          SAMPLE_FOLDER: ${{ inputs.sampleFolder }}
        run: |
          set -euo pipefail

          # Normalize any Windows-style backslashes in the input to forward slashes
          SAMPLE_FOLDER="${SAMPLE_FOLDER//\\//}"

          # Mirrors Validate-Metadata.ps1: metadata.json lives at $SAMPLE_FOLDER/metadata.json
          METADATA_PATH="${SAMPLE_FOLDER}/metadata.json"

          # ── Validate file exists ──────────────────────────────────────────
          if [[ ! -f "${METADATA_PATH}" ]]; then
            echo "ERROR: metadata.json not found at '${SAMPLE_FOLDER}/metadata.json'" >&2
            exit 1
          fi
          echo "== Parsing metadata: ${METADATA_PATH} =="

          # ── Validate .testResult.deployments block is present ─────────────
          DEPLOYMENTS=$(jq -c '.testResult.deployments // empty' "${METADATA_PATH}")
          if [[ -z "${DEPLOYMENTS}" ]]; then
            echo "ERROR: '.testResult.deployments' not found in '${METADATA_PATH}'" >&2
            exit 1
          fi

          # ── Helper: POST a pre-built JSON body to the Kusto REST endpoint ──
          run_kusto_query () {
            local body="$1"
            az rest \
              --method POST \
              --url "${CLUSTER_URL}/v1/rest/query" \
              --headers "Content-Type=application/json" \
              --body "${body}" \
              --resource "https://kusto.kusto.windows.net"
          }

          OVERALL_PASS=true

          # ── Iterate over every entry in .testResult.deployments ───────────
          while IFS= read -r ENTRY; do
            TEMPLATE_FILE_NAME=$(echo "${ENTRY}" | jq -r '.key')
            CORRELATION_ID=$(echo "${ENTRY}"    | jq -r '.value.correlationId  // empty')
            DEPLOYMENT_NAME=$(echo "${ENTRY}"   | jq -r '.value.deploymentName // empty')
            ENTRY_TIMESTAMP=$(echo "${ENTRY}"   | jq -r '.value.timestamp      // "N/A"')
            EXPECTED_HASH=$(echo "${ENTRY}"     | jq -r '.value.templatehash   // empty')

            echo ""
            echo "================================================================"
            echo "  Template file : ${TEMPLATE_FILE_NAME}"
            echo "  correlationId : ${CORRELATION_ID:-<missing>}"
            echo "  deploymentName: ${DEPLOYMENT_NAME:-<missing>}"
            echo "  timestamp     : ${ENTRY_TIMESTAMP}"
            echo "  expected hash : ${EXPECTED_HASH:-<missing>}"
            echo "================================================================"

            # Validate required fields before querying
            if [[ -z "${CORRELATION_ID}" ]]; then
              echo "ERROR: 'correlationId' missing for '${TEMPLATE_FILE_NAME}'" >&2
              OVERALL_PASS=false; continue
            fi
            if [[ -z "${DEPLOYMENT_NAME}" ]]; then
              echo "ERROR: 'deploymentName' missing for '${TEMPLATE_FILE_NAME}'" >&2
              OVERALL_PASS=false; continue
            fi
            if [[ -z "${EXPECTED_HASH}" ]]; then
              echo "ERROR: 'templatehash' missing for '${TEMPLATE_FILE_NAME}'" >&2
              OVERALL_PASS=false; continue
            fi

            # Build request body; jq handles JSON-escaping of all KQL string values
            REQUEST_BODY=$(jq -n \
              --arg db  "${DATABASE}" \
              --arg cid "${CORRELATION_ID}" \
              --arg dn  "${DEPLOYMENT_NAME}" \
              '{db: $db, csl: "Deployments | where correlationId == \"\($cid)\" | where deploymentName == \"\($dn)\" | project timestamp=TIMESTAMP, deploymentName, executionStatus, templateHash | top 1 by timestamp desc"}')

            echo "Running Kusto query for '${TEMPLATE_FILE_NAME}'..."
            RESPONSE=$(run_kusto_query "${REQUEST_BODY}")

            ROW_COUNT=$(echo "${RESPONSE}" | jq '(.Tables[0].Rows // []) | length')
            if [[ "${ROW_COUNT}" -eq 0 ]]; then
              echo "ERROR: No ADX record found — correlationId='${CORRELATION_ID}' deploymentName='${DEPLOYMENT_NAME}'" >&2
              OVERALL_PASS=false; continue
            fi

            # Extract field values by column name (robust against column-order changes)
            ACTUAL_STATUS=$(echo "${RESPONSE}" | jq -r \
              '.Tables[0] as $t | ($t.Columns | map(.ColumnName) | index("executionStatus")) as $i | $t.Rows[0][$i]')
            ACTUAL_HASH=$(echo "${RESPONSE}" | jq -r \
              '.Tables[0] as $t | ($t.Columns | map(.ColumnName) | index("templateHash")) as $i | $t.Rows[0][$i]')

            echo "  actual status : ${ACTUAL_STATUS}"
            echo "  actual hash   : ${ACTUAL_HASH}"

            # Compare executionStatus
            if [[ "${ACTUAL_STATUS}" != "Succeeded" ]]; then
              echo "FAIL: executionStatus='${ACTUAL_STATUS}' (expected 'Succeeded') — correlationId='${CORRELATION_ID}' deploymentName='${DEPLOYMENT_NAME}'" >&2
              OVERALL_PASS=false
            else
              echo "PASS: executionStatus = Succeeded"
            fi

            # Compare templateHash
            if [[ "${ACTUAL_HASH}" != "${EXPECTED_HASH}" ]]; then
              echo "FAIL: templateHash mismatch for '${TEMPLATE_FILE_NAME}'" >&2
              echo "      expected : ${EXPECTED_HASH}" >&2
              echo "      actual   : ${ACTUAL_HASH}" >&2
              OVERALL_PASS=false
            else
              echo "PASS: templateHash matches"
            fi

          done < <(jq -c 'to_entries[]' <<< "${DEPLOYMENTS}")

          echo ""
          if [[ "${OVERALL_PASS}" != "true" ]]; then
            echo "VALIDATION FAILED: one or more deployment entries did not pass." >&2
            exit 1
          fi
          echo "== All deployment validations PASSED =="