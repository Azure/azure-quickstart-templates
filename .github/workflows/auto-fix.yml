name: Query ADX

on:
  workflow_dispatch:
    inputs:
      correlation_id:
        description: 'ARM correlationId to look up in ADX'
        required: true
        type: string

jobs:
  query-adx:
    runs-on: ubuntu-latest
    environment: adx-readonly  # require reviewers in repo settings
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Azure login via OIDC (federated to UAMI)
        uses: azure/login@v2
        with:
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          client-id: ${{ secrets.AZURE_UAMI_CLIENT_ID }}

      - name: Query ADX via REST
        shell: bash
        env:
          CLUSTER_URL: "https://armprodeus.eastus.kusto.windows.net"
          DATABASE: ${{ secrets.ADX_DATABASE }}
          CORRELATION_ID: ${{ inputs.correlation_id }}
        run: |
          set -euo pipefail

          run_query () {
            local table="$1"
            local label="$2"
            local query="${table} | where correlationId == \"${CORRELATION_ID}\" | project TIMESTAMP, deploymentName, executionStatus, templateHash"
            echo "== Query: ${label} =="
            az rest \
              --method POST \
              --url "${CLUSTER_URL}/v1/rest/query" \
              --headers "Content-Type=application/json" \
              --body "$(jq -n --arg db "${DATABASE}" --arg csl "${query}" '{db:$db,csl:$csl}')" \
              --resource "https://kusto.kusto.windows.net"
          }

          run_query "Deployments" "Deployments"