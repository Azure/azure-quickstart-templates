name: Query ADX

on:
  workflow_dispatch:
    inputs:
      correlation_id:
        description: 'ARM correlationId to look up in ADX'
        required: true
        type: string

jobs:
  query-adx:
    runs-on: ubuntu-latest
    environment: adx-readonly  # require reviewers in repo settings
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Azure login via OIDC (federated to UAMI)
        uses: azure/login@v2
        with:
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          client-id: ${{ secrets.AZURE_UAMI_CLIENT_ID }}

      - name: Query ADX via REST
        shell: bash
        env:
          CLUSTER_URL: "https://armprodeus.eastus.kusto.windows.net"
          DATABASE: ${{ secrets.ADX_DATABASE }}
          CORRELATION_ID: ${{ inputs.correlation_id }}
        run: |
          set -euo pipefail

          # Token for ADX
          TOKEN="$(az account get-access-token \
            --resource "https://kusto.kusto.windows.net" \
            --query accessToken -o tsv)"

          if [[ -z "${TOKEN}" ]]; then
            echo "::error::Failed to acquire ADX access token" >&2
            exit 1
          fi

          KUSTO_QUERY="Unionizer(\"Deployments\", \"DeploymentOperations\") | where correlationId == \"${CORRELATION_ID}\""

          HTTP_CODE=$(curl -sS -o /tmp/adx_response.json -w "%{http_code}" \
            -X POST "${CLUSTER_URL}/v1/rest/query" \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$(jq -n --arg db "${DATABASE}" --arg csl "${KUSTO_QUERY}" '{db:$db,csl:$csl}')")

          if [[ "${HTTP_CODE}" -lt 200 || "${HTTP_CODE}" -ge 300 ]]; then
            echo "::error::ADX returned HTTP ${HTTP_CODE}" >&2
            echo "--- Raw response ---" >&2
            cat /tmp/adx_response.json >&2
            exit 1
          fi

          jq . /tmp/adx_response.json